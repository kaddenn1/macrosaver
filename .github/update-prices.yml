name: Daily Price Automation Engine

on:
  schedule:
    # Trigger automatically every single night at midnight (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # This button lets you log into GitHub and trigger the update instantly with one click

jobs:
  sync-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚡ Run MacroSaver Scraper Engine
        run: node scripts/update-prices.js

      - name: 🚀 Commit and Push Fresh Affiliate Prices
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products.ts
          git diff-index --quiet HEAD || git commit -m "chore: automated daily price sync [skip ci]"
          git push