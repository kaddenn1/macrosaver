name: Quality checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate catalog
        run: npm run validate:data
      - name: Run unit tests
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Build
        run: npm run build
